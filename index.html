<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Luxe Prospect">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0EA5A0">
<meta http-equiv="cache-control" content="no-cache">
<title>Luxe Prospect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

/* ── LIGHT THEME (DEFAULT) ── */
:root{
  --bg:#F0F4F8;--bg2:#FFFFFF;--bg3:#E8EEF4;
  --card:#FFFFFF;--card2:#F5F8FA;--card3:#EBF0F5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.04);
  --text:#1A2332;--text2:#3D4F63;--muted:#6B7C93;--dim:#A0AFBF;
  --gold:#C9933A;--gold2:#A67B2E;--gdbg:rgba(201,147,58,0.12);
  --teal:#0EA5A0;--teal2:#0B8580;--tlbg:rgba(14,165,160,0.12);
  --green:#10B981;--gnbg:rgba(16,185,129,0.12);
  --red:#EF4444;--rdbg:rgba(239,68,68,0.12);
  --blue:#3B82F6;--blbg:rgba(59,130,246,0.12);
  --purple:#8B5CF6;--pubg:rgba(139,92,246,0.12);
  --amber:#F59E0B;--ambg:rgba(245,158,11,0.12);
  --orange:#F97316;--orbg:rgba(249,115,22,0.12);
  --it:env(safe-area-inset-top,44px);--ib:env(safe-area-inset-bottom,34px);
  --il:env(safe-area-inset-left,0px);--ir:env(safe-area-inset-right,0px);
  --f:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow2:0 4px 24px rgba(0,0,0,0.12);
}
/* ── DARK THEME ── */
body.dark{
  --bg:#0D1117;--bg2:#161B22;--bg3:#1C2128;
  --card:#161B22;--card2:#1C2128;--card3:#21262D;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.05);
  --text:#F0F6FC;--text2:#C9D1D9;--muted:#8B949E;--dim:#484F58;
  --gold:#D4A843;--gold2:#B8913A;--gdbg:rgba(212,168,67,0.15);
  --teal:#2DD4BF;--teal2:#14B8A6;--tlbg:rgba(45,212,191,0.12);
  --green:#3FB950;--gnbg:rgba(63,185,80,0.14);
  --red:#F85149;--rdbg:rgba(248,81,73,0.14);
  --blue:#58A6FF;--blbg:rgba(88,166,255,0.14);
  --purple:#BC8CFF;--pubg:rgba(188,140,255,0.14);
  --amber:#E3B341;--ambg:rgba(227,179,65,0.14);
  --orange:#F0883E;--orbg:rgba(240,136,62,0.14);
  --shadow:0 2px 16px rgba(0,0,0,0.4);
  --shadow2:0 4px 32px rgba(0,0,0,0.5);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{height:100%;height:-webkit-fill-available;-webkit-font-smoothing:antialiased;}
body{font-family:var(--f);background:var(--bg);color:var(--text);overflow:hidden;position:fixed;width:100%;height:100%;top:0;left:0;right:0;bottom:0;transition:background .25s,color .25s;}
#wrap{display:flex;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;}

/* TOPBAR */
#topbar{background:var(--card);border-bottom:1px solid var(--border);padding:calc(var(--it)+10px) calc(var(--ir)+14px) 11px calc(var(--il)+14px);display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:100;box-shadow:var(--shadow);}
.tb-logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--gold);line-height:1;}
.tb-sub{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-top:2px;}
.tb-back{background:none;border:none;color:var(--teal);font-size:16px;font-weight:700;font-family:var(--f);padding:6px 0;cursor:pointer;display:flex;align-items:center;gap:3px;flex-shrink:0;touch-action:manipulation;}
.tb-back:active{opacity:.6;}
.tb-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;touch-action:manipulation;-webkit-appearance:none;}
.tb-btn:active{transform:scale(.9);}
.btn-add{background:var(--teal);color:#fff;font-size:22px;font-weight:300;}
.btn-th{background:var(--card2);border:1px solid var(--border);color:var(--text);}

/* SCROLL */
#scr{flex:1;overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;min-height:0;background:var(--bg);}

/* TABS */
#tabs{background:var(--card);border-top:1px solid var(--border);display:flex;height:calc(56px + var(--ib));padding-bottom:var(--ib);flex-shrink:0;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,0.06);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 2px 4px;cursor:pointer;position:relative;-webkit-user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.tab:active{opacity:.6;}
.tab-i{font-size:22px;line-height:1;transition:transform .15s;}
.tab-t{font-size:9.5px;color:var(--muted);font-weight:600;}
.tab.on .tab-t{color:var(--teal);}
.tab.on .tab-i{transform:scale(1.1);}
.dot{position:absolute;top:5px;right:calc(50% - 17px);background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;padding:0 4px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:2px solid var(--card);}
.dot.gd{background:var(--teal);color:#fff;}

/* HOME */
.home-hero{background:linear-gradient(135deg,var(--teal) 0%,var(--teal2) 100%);padding:18px 16px 16px;color:#fff;position:relative;overflow:hidden;}
.home-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%;}
.home-greeting{font-size:14px;opacity:.85;margin-bottom:2px;}
.home-date{font-size:18px;font-weight:800;margin-bottom:12px;}
.home-callbar{background:rgba(255,255,255,0.15);border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.home-callbar-left{font-size:13px;font-weight:600;}
.home-callbar-n{font-size:22px;font-weight:800;}
.home-callbar-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:8px;color:#fff;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f);touch-action:manipulation;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 10px;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--shadow);touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.sc:active{opacity:.85;}
.sc-ico{font-size:24px;margin-bottom:6px;}
.sc-val{font-size:26px;font-weight:800;color:var(--text);line-height:1;margin-bottom:2px;font-family:'Playfair Display',serif;}
.sc-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.sc-sub{font-size:11px;color:var(--dim);margin-top:2px;}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 16px 16px;}
.sc-gold::after{background:var(--gold);}
.sc-teal::after{background:var(--teal);}
.sc-green::after{background:var(--green);}
.sc-orange::after{background:var(--orange);}

/* QUICK ACTIONS */
.qa-strip{display:flex;gap:8px;padding:0 14px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.qa-strip::-webkit-scrollbar{display:none;}
.qa-chip{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:14px;cursor:pointer;flex-shrink:0;min-width:72px;box-shadow:var(--shadow);font-size:11.5px;font-weight:600;color:var(--text2);touch-action:manipulation;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;}
.qa-chip:active{background:var(--card2);}
.qa-chip span{font-size:22px;}
.qa-badge{background:var(--teal);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;}

/* SECTIONS */
.section-hdr{padding:0 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.section-lbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.3px;}
.section-link{font-size:13px;color:var(--teal);font-weight:700;background:none;border:none;font-family:var(--f);cursor:pointer;padding:0;touch-action:manipulation;}
.slnk{font-size:13px;color:var(--teal);font-weight:700;background:none;border:none;font-family:var(--f);cursor:pointer;padding:0;touch-action:manipulation;}
.empty-strip{padding:14px 16px;font-size:13px;color:var(--dim);font-style:italic;background:var(--card);border-radius:14px;margin:0 14px 14px;border:1px solid var(--border);text-align:center;}
.empty-strip .link{color:var(--teal);font-style:normal;font-weight:600;cursor:pointer;}

/* CARDS & LISTS */
.card-list{background:var(--card);border-radius:14px;margin:0 14px 14px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}
.card-block{background:var(--card);border-radius:14px;margin:0 14px 14px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}

/* LIST ROW */
.row{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card);border-bottom:1px solid var(--border2);position:relative;overflow:hidden;}
.row:last-child{border-bottom:none;}
.row:active{background:var(--card2);}
.row-in{display:flex;align-items:center;gap:12px;flex:1;min-width:0;cursor:pointer;}

/* AVATARS */
.av{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;object-fit:cover;}
.av.rnd{border-radius:50%;}
.av.sm{width:36px;height:36px;border-radius:50%;font-size:13px;}
.c0{background:linear-gradient(135deg,#667EEA,#764BA2);}
.c1{background:linear-gradient(135deg,#43E97B,#38F9D7);}
.c2{background:linear-gradient(135deg,#FA709A,#FEE140);}
.c3{background:linear-gradient(135deg,#4FACFE,#00F2FE);}
.c4{background:linear-gradient(135deg,#F093FB,#F5576C);}
.c5{background:linear-gradient(135deg,#FFA726,#FB8C00);}
.c6{background:linear-gradient(135deg,#26C6DA,#00B0FF);}
.c7{background:linear-gradient(135deg,#66BB6A,#43A047);}
.rt{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.rs{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.rm{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.rtime{font-size:11px;color:var(--dim);}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap;}
.b-un{background:var(--card3);color:var(--muted);}
.b-vm{background:var(--blbg);color:var(--blue);}
.b-na{background:var(--ambg);color:var(--amber);}
.b-cb{background:var(--gdbg);color:var(--gold);}
.b-it{background:var(--gnbg);color:var(--green);}
.b-ni{background:var(--rdbg);color:var(--red);}
.b-ap{background:var(--pubg);color:var(--purple);}
.b-so{background:var(--gdbg);color:var(--gold);}
.b-ht{background:var(--orbg);color:var(--orange);}
.b-pl{background:var(--tlbg);color:var(--teal);}
.b-nd{background:var(--card3);color:var(--dim);}

/* VENDOR TYPE TAGS */
.vt{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap;}
.vt-up{background:#DBEAFE;color:#1D4ED8;}
.vt-dn{background:#D1FAE5;color:#065F46;}
.vt-iv{background:#EDE9FE;color:#5B21B6;}
.vt-se{background:#FEF3C7;color:#92400E;}
.vt-by{background:#FCE7F3;color:#9D174D;}
body.dark .vt-up{background:rgba(59,130,246,.2);color:#93C5FD;}
body.dark .vt-dn{background:rgba(16,185,129,.2);color:#6EE7B7;}
body.dark .vt-iv{background:rgba(139,92,246,.2);color:#C4B5FD;}
body.dark .vt-se{background:rgba(245,158,11,.2);color:#FCD34D;}
body.dark .vt-by{background:rgba(236,72,153,.2);color:#F9A8D4;}
.vt-btn{padding:8px 16px;border-radius:20px;font-family:var(--f);font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card2);color:var(--muted);transition:all .15s;touch-action:manipulation;}
.vt-btn:active{transform:scale(.95);}
.vt-btn.on{border-color:var(--teal);background:var(--tlbg);color:var(--teal);}

/* SWIPE */
.sw{position:relative;overflow:hidden;}
.sw-acts{position:absolute;right:0;top:0;bottom:0;display:flex;}
.sa{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 13px;cursor:pointer;font-size:11px;font-weight:700;gap:4px;min-width:68px;-webkit-user-select:none;}
.sa span{font-size:21px;}
.sa-rd{background:#EF4444;color:#fff;}
.sa-bl{background:#3B82F6;color:#fff;}
.sa-or{background:#F97316;color:#fff;}
.sa-gn{background:var(--green);color:#fff;}
.sa-gr{background:#6B7280;color:#fff;}
.sa-pu{background:#8B5CF6;color:#fff;}

/* SEARCH BAR */
.sb{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;}
.sb-in{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:9px;padding:10px 14px;transition:border-color .15s;}
.sb-in:focus-within{border-color:var(--teal);}
.sb-in input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--f);font-size:16px;min-width:0;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.sb-in input::placeholder{color:var(--dim);}
.sb-ic{color:var(--muted);font-size:17px;flex-shrink:0;}
.sb-x{color:var(--muted);font-size:16px;flex-shrink:0;cursor:pointer;padding:2px 4px;touch-action:manipulation;}

/* CHIPS */
.chips{display:flex;gap:7px;padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--card);border-bottom:1px solid var(--border);scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:600;white-space:nowrap;cursor:pointer;border:1.5px solid var(--border);background:var(--card2);color:var(--muted);flex-shrink:0;touch-action:manipulation;}
.chip:active{opacity:.7;}
.chip.on{background:var(--teal);color:#fff;border-color:var(--teal);}

/* STICKY HEADER */
.sticky-hdr{padding:9px 16px;font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;background:var(--bg);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:5;}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:flex-end;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}
.sht{background:var(--card);border-top:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-height:93vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--ib)+12px);}
.sht-h{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 6px;}
.sht-hdr{padding:4px 18px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.sht-ttl{font-size:20px;font-weight:800;color:var(--text);}
.sht-sub{font-size:13px;color:var(--muted);margin-top:3px;}
.sht-x{width:30px;height:30px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;}
.sht-bd{padding:16px 18px 4px;}
.sht-ft{padding:12px 18px 0;display:flex;gap:10px;}

/* FORMS */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;}
.fi,.fs,.fta{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--f);font-size:16px;padding:12px 14px;outline:none;-webkit-appearance:none;transition:border-color .15s;-webkit-tap-highlight-color:transparent;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--teal);}
.fta{resize:none;line-height:1.5;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* BUTTONS */
.btn{padding:13px 18px;border-radius:13px;font-family:var(--f);font-size:15px;font-weight:700;cursor:pointer;border:none;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;gap:7px;touch-action:manipulation;}
.btn:active{opacity:.8;transform:scale(.97);}
.btn-gd{background:var(--teal);color:#fff;}
.btn-gh{background:var(--card2);border:1.5px solid var(--border);color:var(--text2);}
.btn-rd{background:var(--red);color:#fff;}
.btn-bl{background:var(--blue);color:#fff;}
.btn-gn{background:var(--green);color:#fff;}
.btn-sm{padding:9px 14px;font-size:13px;border-radius:10px;}
.btn-fw{width:100%;justify-content:center;}
.btn-ghost-sm{padding:8px 12px;border-radius:10px;font-family:var(--f);font-size:12.5px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card2);color:var(--text2);touch-action:manipulation;}
.btn-teal-sm{padding:8px 12px;border-radius:10px;font-family:var(--f);font-size:12.5px;font-weight:700;cursor:pointer;border:none;background:var(--teal);color:#fff;touch-action:manipulation;}

/* ICON BUTTON */
.ibt{width:38px;height:38px;border-radius:10px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;-webkit-appearance:none;flex-shrink:0;touch-action:manipulation;}
.ibt:active{background:var(--card3);}
.ibt.gn{background:var(--gnbg);border-color:var(--green);}
.ibt.bl{background:var(--blbg);border-color:var(--blue);}

/* PROGRESS BARS */
.pr{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border2);cursor:pointer;}
.pr:last-child{border-bottom:none;}
.pr-l{font-size:12.5px;color:var(--text2);flex:1;}
.pr-b{flex:2;height:5px;background:var(--card3);border-radius:3px;overflow:hidden;}
.pr-f{height:100%;border-radius:3px;}
.pr-n{font-size:11.5px;color:var(--muted);min-width:28px;text-align:right;font-weight:700;}

/* SMART CALLS */
.smart-hdr{background:linear-gradient(135deg,var(--teal) 0%,var(--teal2) 100%);padding:16px;color:#fff;}
.smart-hdr-title{font-size:24px;font-weight:800;margin-bottom:3px;}
.smart-hdr-sub{font-size:13px;opacity:.85;margin-bottom:12px;}
.call-progress-wrap{background:rgba(255,255,255,0.15);border-radius:10px;padding:10px 14px;}
.call-progress-bar-bg{background:rgba(255,255,255,0.2);border-radius:4px;height:6px;margin-bottom:6px;}
.call-progress-bar-fill{height:100%;border-radius:4px;background:#fff;transition:width .3s;}
.call-progress-label{font-size:12px;font-weight:600;}
.smart-toolbar{padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;}
.sale-alerts{background:var(--ambg);border-bottom:1px solid var(--border);padding:10px 16px;}
.sale-alert-hdr{font-size:11px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.sale-alert-hdr button{background:none;border:none;color:var(--teal);font-size:12.5px;font-weight:700;cursor:pointer;font-family:var(--f);}
.sale-alert-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(245,158,11,.2);font-size:13px;}
.sale-alert-row:last-of-type{border-bottom:none;}
.sale-alert-row div{flex:1;min-width:0;font-size:12.5px;color:var(--text2);line-height:1.4;}

/* ── PHONE FORMATTER ── */
function fmtPh(ph){
  if(!ph)return '';
  var s=String(ph).trim();
  if(/no id|no number|not in|^\(no|\bn\/a\b|^none$/i.test(s))return '';
  if(s.endsWith('.0'))s=s.slice(0,-2);
  var d=s.replace(/[^\d]/g,'');
  if(d.startsWith('61')&&d.length===11)d='0'+d.slice(2);
  if(/^4\d{8}$/.test(d))d='0'+d;
  if(d.length===9&&d[0]==='4')d='0'+d;
  if(/^04\d{8}$/.test(d))return d;
  if(/^0[2378]\d{8}$/.test(d))return d;
  if(d.length>=8)return d;
  return '';
}

/* ── DATE HELPERS ── */
function parseApptDate(raw){
  if(!raw)return null;
  try{
    if(raw.includes('/')){var p=raw.split('/');if(p[2])return new Date(p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0')+'T00:00:00');}
    return new Date(raw.includes('T')?raw:raw+'T00:00:00');
  }catch(e){return null;}
}
function fmtApptDay(raw){var d=parseApptDate(raw);return d&&!isNaN(d)?d.getDate():'?';}
function fmtApptMonth(raw){var d=parseApptDate(raw);return d&&!isNaN(d)?d.toLocaleDateString('en-AU',{month:'short'}).toUpperCase():'—';}
function fmtApptFull(raw,time){var d=parseApptDate(raw);if(!d||isNaN(d))return raw||'';return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'})+(time?' at '+time:'');}
function ago(d){var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return 'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return Math.floor(s/604800)+'w';}

        '<div class="av rnd '+avc(p.n)+'" style="display:none">'+ini(p.n)+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div class="rt">'+( p.n||'Unknown')+'</div>'+
          '<div class="rs">'+( p.a||'')+'</div>'+
          '<div class="rm">'+
            '<span class="bdg '+catCls+'">'+cat+'</span>'+
            vtag+
            (lx?'<span class="rtime">'+ago(lx.date)+' ago</span>':'<span class="rtime">NOT CALLED</span>')+

function togSmSel(id){if(S.smSel.has(id))S.smSel.delete(id);else S.smSel.add(id);rSmart();}
function smSelAll(){var arch=gSA();var pp=gP().filter(function(p){return!p.archived;});var hl=gH().filter(function(h){return!h.archived;});var all=[...new Map([...pp.filter(function(p){return p.isHot||hl.find(function(h){return h.a===p.a;});}),...pp.filter(function(p){return['callback','interested','voicemail','no_answer'].includes(p.status);})].map(function(p){return[p.id,p];})).values()].filter(function(p){return!arch.includes(p.id);});if(S.smSel.size===all.length)S.smSel=new Set();else S.smSel=new Set(all.map(function(p){return p.id;}));rSmart();}
function smBulkSMS(){var sel=gP().filter(function(p){return S.smSel.has(p.id)&&p.p;});if(!sel.length){toast('No contacts with phones selected');return;}window._bkOv=sel;S.bkSel=new Set(sel.map(function(p){return p.id;}));S.prev='smart';go('bulk');}

  modal('<div class="sht"><div class="sht-h"></div><div class="sht-hdr"><div><div class="sht-ttl">🏡 Log Area Activity</div></div><button class="sht-x" onclick="cls()">✕</button></div><div class="sht-bd"><div class="fg"><div class="fl">Type</div><select class="fs" id="sat"><option value="sold">Property Sold</option><option value="listed">New Listing</option></select></div><div class="fg"><div class="fl">Address</div><input class="fi" id="saa" placeholder="e.g. 45 Hillview Rd"></div><div class="fg"><div class="fl">Street</div><select class="fs" id="sas"><option value="">Select…</option>'+sts.map(function(s){return'<option value="'+esc(s)+'">'+s+'</option>';}).join('')+'</select></div></div><div class="sht-ft"><button class="btn btn-gh" onclick="cls()">Cancel</button><button class="btn btn-gd" onclick="saveSaleAlert()">Add to Smart Calls</button></div></div>');

function saveSaleAlert(){var t=$('sat').value,a=$('saa').value,s=$('sas').value;if(!a||!s){toast('Fill in address and street');return;}var alts=JSON.parse(localStorage.getItem('sa_alts')||'[]');var nb=gP().filter(function(p){return p.s===s&&!p.archived;}).length;alts.unshift({type:t,addr:a,street:s,nb:nb,date:new Date().toISOString()});localStorage.setItem('sa_alts',JSON.stringify(alts.slice(0,10)));addStrSm(s);cls();toast(nb+' owners added to Smart Calls');}

/* ── PROPERTIES ── */
function filt(){var pp=gP().filter(function(p){return!p.archived;});if(S.fstr)pp=pp.filter(function(p){return p.s===S.fstr;});if(S.fst)pp=pp.filter(function(p){return p.status===S.fst;});if(S.fq){var q=S.fq.toLowerCase();pp=pp.filter(function(p){return(p.a||'').toLowerCase().includes(q)||(p.n||'').toLowerCase().includes(q)||(p.p||'').includes(q)||(p.e||'').toLowerCase().includes(q);});}return pp;}

function rProps(){
  var ff=filt(),pg=ff.slice(0,S.pgSz),more=ff.length>S.pgSz;
  var sts=[...new Set(gP().filter(function(p){return!p.archived;}).map(function(p){return p.s;}))].sort();
  $('scr').innerHTML=
  '<div class="sb"><div class="sb-in"><span class="sb-ic">⌕</span><input id="ps" type="text" placeholder="Search address, name, phone…" value="'+(S.fq||'').replace(/"/g,'&quot;')+'" autocomplete="off" autocorrect="off" spellcheck="false" autocapitalize="none" inputmode="search">'+(S.fq?'<span class="sb-x" onclick="S.fq=\'\';rProps()">✕</span>':'')+'</div></div>'+
  '<div style="padding:8px 14px 0;background:var(--card);border-bottom:1px solid var(--border)"><select class="fs" style="border-radius:10px;font-size:13px;padding:8px 12px" onchange="S.fstr=this.value;S.pgSz=40;rProps()"><option value="">All Streets ('+sts.length+')</option>'+sts.map(function(s){return'<option value="'+esc(s)+'"'+(S.fstr===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div>'+
  '<div class="chips"><div class="chip'+(S.fst?'':' on')+'" onclick="apF(\'status\',\'\')">All '+gP().filter(function(p){return!p.archived;}).length+'</div>'+
  [['uncontacted','Uncontacted'],['voicemail','Voicemail'],['no_answer','No Answer'],['callback','Callback'],['interested','⭐'],['not_interested','Not Int.'],['appointment','📅 Booked']].map(function(e){return'<div class="chip'+(S.fst===e[0]?' on':'')+'" onclick="apF(\'status\',\''+e[0]+'\')">'+e[1]+'</div>';}).join('')+
  (S.fstr?'<div class="chip on" onclick="apF(\'str\',\'\')">📍'+S.fstr.split(',')[0]+' ×</div>':'')+
  '</div>'+
  '<div style="padding:8px 16px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border2);display:flex;justify-content:space-between"><span>'+ff.length.toLocaleString()+' properties</span><div style="display:flex;gap:12px"><button class="slnk" onclick="go(\'streets\')">By Street</button><button class="slnk" onclick="go(\'bulk\')">Bulk SMS</button></div></div>'+
  '<div id="pl">'+(pg.length===0?'<div class="empty"><div class="empty-i">🔍</div><div class="empty-t">No results</div><div class="empty-s">Try a different search or clear filters</div></div>':pg.map(pRow).join(''))+'</div>'+
  (more?'<div style="padding:14px"><button class="btn btn-gh btn-fw" onclick="moreP()">Load more ('+( ff.length-S.pgSz)+' remaining)</button></div>':'')+
  '<div style="height:80px"></div>';
  srchBind('ps',function(){var l=$('pl');if(l)l.innerHTML=filt().slice(0,S.pgSz).map(pRow).join('');setTimeout(swipes,50);},function(v){S.fq=v;S.pgSz=40;});
  setTimeout(swipes,80);
}
function apF(k,v){if(k==='status')S.fst=v;else S.fstr=v;S.pgSz=40;rProps();}
function moreP(){S.pgSz+=40;var l=$('pl');if(l)l.innerHTML=filt().slice(0,S.pgSz).map(pRow).join('');setTimeout(swipes,80);}

function pRow(p){
  var hl=gH().filter(function(h){return!h.archived;});var isH=p.isHot||hl.find(function(h){return h.a===p.a;});
  var lx=gI().filter(function(i){return i.propertyId===p.id;}).sort(function(a,b){return new Date(b.date)-new Date(a.date);})[0];
  var vtag=p.vtype?'<span class="vt '+vsClass(p.vtype)+'">'+vsLabel(p.vtype)+'</span>':'';
  var avUrl=avatarUrl(p.n,p.e,80);
  return '<div class="sw" id="swp'+p.id+'">'+
    '<div class="sw-acts">'+
      '<div class="sa sa-bl" onclick="editM('+p.id+')"><span>✏️</span>Edit</div>'+
      '<div class="sa sa-or" onclick="togHot('+p.id+')"><span>'+(isH?'💔':'🔥')+'</span>'+(isH?'Unhot':'Hot')+'</div>'+
      '<div class="sa sa-gn" onclick="callM(\''+esc(p.p)+'\',\''+esc(p.n)+'\',\''+esc(p.a)+'\','+p.id+')"><span>📞</span>Call</div>'+
      '<div class="sa sa-rd" onclick="delM('+p.id+')"><span>🗑️</span>Del</div>'+
    '</div>'+
    '<div class="row" id="pr'+p.id+'">'+
      '<div class="row-in" onclick="oProp('+p.id+')">'+
        '<img class="av" src="'+avUrl+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'" loading="lazy" alt="'+ini(p.n)+'" style="border-radius:12px">'+
        '<div class="av '+avc(p.n)+'" style="display:none;border-radius:12px">'+ini(p.n)+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div class="rt">'+( p.a||'')+(isH?' <span class="bdg b-ht" style="font-size:9px;padding:1px 6px">🔥</span>':'')+'</div>'+
          '<div class="rs">'+( p.n||'<em style="color:var(--dim)">Unknown owner</em>')+'</div>'+
          '<div class="rm"><span class="bdg '+bc(p.status)+'">'+(p.status||'').replace(/_/g,' ')+'</span>'+vtag+(p.p?'<span style="font-size:11px;color:var(--dim);font-family:monospace">'+p.p+'</span>':'')+(lx?'<span class="rtime">'+ago(lx.date)+'</span>':'')+'</div>'+
        '</div>'+
        '<div style="color:var(--muted);font-size:16px">›</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

/* ── PROPERTY DETAIL with TABS ── */

  var p=gP().find(function(x){return x.id===S.pid;});if(!p){go('props');return;}
  var hl=gH().filter(function(h){return!h.archived;});var isH=p.isHot||hl.find(function(h){return h.a===p.a;});
  var pix=gI().filter(function(i){return i.propertyId===p.id;}).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  var sub=SUBURB_DATA[p.sb]||SUBURB_DATA['Melbourne'];
  var avUrl=avatarUrl(p.n,p.e,120);
  var tab=S.detTab||'notes';

  $('scr').innerHTML=
  // HERO
  '<div class="det-hero">'+
    '<div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:14px">'+
      '<img class="av rnd" src="'+avUrl+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'" loading="lazy" alt="'+ini(p.n)+'" style="width:56px;height:56px;flex-shrink:0">'+
      '<div class="av rnd '+avc(p.n)+'" style="display:none;width:56px;height:56px;flex-shrink:0;font-size:20px">'+ini(p.n)+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="det-name">'+(p.n||'Unknown Owner')+'</div>'+
        '<div class="det-addr">'+(p.a||'')+'</div>'+
        '<div class="rm" style="margin-top:6px">'+
          '<span class="bdg '+bc(p.status)+'">'+(p.status||'').replace(/_/g,' ')+'</span>'+
          (isH?'<span class="bdg b-ht">🔥 HOT</span>':'')+
          (p.vtype?'<span class="vt '+vsClass(p.vtype)+'">'+vsLabel(p.vtype)+'</span>':'')+
        '</div>'+
      '</div>'+
    '</div>'+
    // QUICK CONTACT ACTIONS
    '<div class="det-actions">'+
      (p.p?'<a href="tel:'+p.p+'" class="det-act-btn gn">📞<span>Call</span></a>':'<div class="det-act-btn disabled">📞<span>No Phone</span></div>')+
      '<button class="det-act-btn bl" onclick="smsM(\''+esc(p.p)+'\',\''+esc(p.n)+'\',\''+esc(p.a)+'\','+p.id+')">💬<span>SMS</span></button>'+
      '<button class="det-act-btn am" onclick="emailM(\''+esc(p.e||'')+'\',\''+esc(p.n)+'\',\''+esc(p.a)+'\','+p.id+')">✉️<span>Email</span></button>'+
      '<button class="det-act-btn pu" onclick="openNote('+p.id+')">📝<span>Note</span></button>'+
    '</div>'+
  '</div>'+
  // QUICK EDIT ACTIONS
  '<div class="qr" style="padding:10px 14px">'+
    '<div class="qb qb-ed" onclick="editM('+p.id+')">✏️ Edit</div>'+
    '<div class="qb qb-ht" onclick="togHot('+p.id+')">'+(isH?'💔 Unhot':'🔥 Hot')+'</div>'+
    '<div class="qb" onclick="setVendorType('+p.id+')">🏷️ Type</div>'+
    '<div class="qb qb-dl" onclick="delM('+p.id+')">🗑️ Del</div>'+
  '</div>'+
  // STATUS ROW
  '<div class="str"><span class="stl">Status</span><select onchange="updSt('+p.id+',this.value)">'+sopts(p.status)+'</select><span style="color:var(--muted)">›</span></div>'+
  // TABS
  '<div class="det-tabs">'+
    ['notes','property','suburb','vendor'].map(function(t){return'<div class="det-tab'+(tab===t?' on':'')+'" onclick="S.detTab=\''+t+'\';rPDet()">'+t.charAt(0).toUpperCase()+t.slice(1)+'</div>';}).join('')+
  '</div>'+
  // TAB CONTENT

function detTabContent(p,tab,pix,sub,isH){
  if(tab==='notes'){
    return '<div class="card-block" style="padding:14px 16px">'+
      '<div class="info-ttl">Interaction History ('+pix.length+')</div>'+
      (pix.length===0?'<div style="color:var(--dim);font-size:13px;font-style:italic">No interactions yet — log a call to get started</div>'
        :pix.map(function(i){return '<div class="tl"><div class="tl-d">'+(i.type==='call'?'📞':i.type==='sms'?'💬':i.type==='email'?'✉️':'📝')+'</div><div class="tl-b"><div class="tl-t">'+i.type+' <span class="bdg '+bc(i.outcome)+'" style="font-size:10px">'+(i.outcome||'')+'</span></div><div class="tl-ts">'+new Date(i.date).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+'</div>'+(i.notes?'<div class="tl-n">'+i.notes+'</div>':'')+'</div></div>';}).join(''))+
    '</div>';
  }
  if(tab==='property'){
    var nearby=gP().filter(function(x){return x.s===p.s&&x.id!==p.id&&!x.archived;}).slice(0,5);
    // Build search query for the property
    var addrEnc=encodeURIComponent((p.a||'')+', Australia');
    var addrShort=encodeURIComponent((p.a||'').split(',')[0]);

    // SATELLITE/STREET VIEW (free, no API key needed)
    // Use Esri World Imagery via iframe embed - shows aerial photo of property
    var mapEmbed='<div style="position:relative;margin:0 0 14px;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--card2)">'+
      '<iframe src="https://maps.google.com/maps?q='+addrEnc+'&t=k&z=18&output=embed" style="width:100%;height:200px;border:0;display:block" loading="lazy"></iframe>'+
      '<div style="position:absolute;bottom:8px;right:8px;display:flex;gap:6px">'+
        '<a href="https://www.google.com/maps/place/'+addrEnc+'" target="_blank" style="background:rgba(0,0,0,.7);color:#fff;padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;text-decoration:none;touch-action:manipulation">🗺️ Maps</a>'+
        '<a href="https://www.google.com/maps/@?api=1&map_action=streetview&query='+addrEnc+'" target="_blank" style="background:rgba(0,0,0,.7);color:#fff;padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;text-decoration:none;touch-action:manipulation">👁 Street</a>'+
      '</div>'+
    '</div>';

    // EXTERNAL LOOKUP LINKS - one tap to view full property details on major sites
    var lookupRow='<div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch">'+
      '<a href="https://www.domain.com.au/property-profile/'+addrShort+'-vic" target="_blank" style="flex-shrink:0;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--text);text-decoration:none;touch-action:manipulation">🏠 Domain</a>'+
      '<a href="https://www.realestate.com.au/sold/in-'+addrShort+'/list-1" target="_blank" style="flex-shrink:0;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--text);text-decoration:none;touch-action:manipulation">🏘 REA</a>'+
      '<a href="https://www.onthehouse.com.au/property/vic/'+addrShort+'" target="_blank" style="flex-shrink:0;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--text);text-decoration:none;touch-action:manipulation">📊 On The House</a>'+
      '<a href="https://www.propertyvalue.com.au/search?q='+addrEnc+'" target="_blank" style="flex-shrink:0;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--text);text-decoration:none;touch-action:manipulation">💰 PropertyValue</a>'+
    '</div>';

    // Try Domain API if connected (free tier)
    if(DOMAIN_TOKEN&&!p._dmLoaded){
      loadDomainData(p).then(function(){if(S.pg==='pdet'&&S.pid===p.id&&S.detTab==='property')rPDet();});

    if(DOMAIN_TOKEN){
      if(p._dmEst){

        '</div>';

        domainData='<div style="background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--dim);text-align:center">Loading Domain estimate…</div>';
      }

    }

    return '<div class="card-block" style="padding:14px 16px">'+

      '<div class="info-r"><div class="ir-l">Suburb</div><div class="ir-v">'+(p.sb||'Melbourne')+'</div></div>'+
      '<div class="info-r"><div class="ir-l">Type</div><div class="ir-v">'+(p.propType||'Residential')+'</div></div>'+

      '<div class="info-r"><div class="ir-l">Last Sold</div><div class="ir-v">'+(p._pfLastSale||p.lastSold||'—')+'</div></div>'+
      '<div class="info-r"><div class="ir-l">Beds/Bath</div><div class="ir-v">'+(p.beds?p.beds+'🛏  '+(p.baths||'—')+'🚿  '+(p.cars||'—')+'🚗':'—')+'</div></div>'+
      (p.landSqm?'<div class="info-r"><div class="ir-l">Land</div><div class="ir-v">'+p.landSqm+' m²</div></div>':'')+
      (p.no?'<div class="info-r"><div class="ir-l">Notes</div><div class="ir-v" style="color:var(--muted)">'+p.no+'</div></div>':'')+
      salesHtml+
    '</div>'+
    (nearby.length?'<div class="card-block" style="padding:14px 16px;margin-top:10px"><div class="info-ttl">Same Street ('+nearby.length+')</div>'+nearby.map(function(n){return'<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2);cursor:pointer;touch-action:manipulation" onclick="oProp('+n.id+')"><img class="av sm" src="'+avatarUrl(n.n,n.e,60)+'" onerror="this.style.display=\'none\'" loading="lazy" style="border-radius:8px"><div style="flex:1;min-width:0"><div class="rt" style="font-size:13px">'+n.a+'</div><div class="rs" style="font-size:12px">'+(n.n||'Unknown')+'</div></div><span class="bdg '+bc(n.status)+'" style="font-size:10px">'+(n.status||'').replace('_',' ')+'</span></div>';}).join('')+'</div>':'');
  }
  if(tab==='suburb'){
    var s=sub||SUBURB_DATA['Melbourne'];
    return '<div class="card-block" style="padding:16px">'+
      '<div class="info-ttl">'+(p.sb||'Melbourne')+' Market Data</div>'+
      '<div style="font-size:12px;color:var(--muted);margin-bottom:14px">'+s.type+' · Updated regularly</div>'+
      suburbStat('Median Sale Price',s.prev,s.med,s.growth)+
      suburbStat('Auction Clear Rate','prev',s.auction,s.growth)+
      '<div class="suburb-row"><div class="suburb-row-lbl">Avg Days on Market</div><div class="suburb-row-val">'+s.dom+' days</div></div>'+
      '<div style="margin-top:14px;background:var(--teal-bg);border:1px solid var(--teal);border-radius:12px;padding:12px 14px">'+
        '<div style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Market Insight</div>'+
        '<div style="font-size:13px;color:var(--text2);line-height:1.6">Properties in '+( p.sb||'Melbourne')+' are performing well. Median price of '+s.med+' with '+s.growth+' growth. Strong buyer demand with '+s.auction+' auction clear rate.</div>'+
      '</div>'+
    '</div>';
  }
  if(tab==='vendor'){
    return '<div class="card-block" style="padding:14px 16px">'+
      '<div class="info-ttl">Vendor Details</div>'+
      '<div class="info-r"><div class="ir-l">Name</div><div class="ir-v">'+(p.n||'—')+'</div></div>'+
      '<div class="info-r"><div class="ir-l">Phone</div><div class="ir-v">'+(p.p?'<a href="tel:'+p.p+'" style="color:var(--teal);text-decoration:none">'+p.p+'</a>':'—')+'</div></div>'+

      '<div class="info-r"><div class="ir-l">Title</div><div class="ir-v" style="color:var(--muted)">'+(p.po||'—')+'</div></div>'+
      '</div>'+

function exportCont(){var manual=gC();var fp=gP().filter(function(p){return p.n&&p.p&&!p.archived;}).map(function(p){return{name:p.n,phone:fmtPh(p.p),email:p.e||'',address:p.a,suburb:p.sb||'',status:p.status,vtype:p.vtype||'',source:'property'};});var all=[...manual.map(function(c){return{name:c.name,phone:fmtPh(c.phone),email:c.email||'',address:c.address||'',notes:c.notes||'',source:'manual'};}), ...fp];var rows=[['Name','Phone','Email','Address','Suburb','Notes','Status','Type','Source']];all.forEach(function(c){rows.push([c.name||'',c.phone||'',c.email||'',c.address||'',c.suburb||'',c.notes||'',c.status||'',c.vtype||'',c.source||'']);});var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='luxe-contacts-'+new Date().toISOString().split('T')[0]+'.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('Exported '+all.length+' contacts ✓');}
function importContM(){modal('<div class="sht"><div class="sht-h"></div><div class="sht-hdr"><div><div class="sht-ttl">⬆ Import Contacts</div><div class="sht-sub">CSV — Name, Phone, Email, Address</div></div><button class="sht-x" onclick="cls()">✕</button></div><div class="sht-bd"><div class="fg"><div class="fl">Upload CSV File</div><input type="file" id="imp-file" accept=".csv,.txt" style="width:100%;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:var(--f);font-size:14px" onchange="readImportFile(this)"></div><div style="text-align:center;color:var(--dim);font-size:13px;padding:4px 0">— or paste below —</div><div class="fg" style="margin-top:8px"><div class="fl">CSV Text</div><textarea class="fta" id="imp-txt" style="min-height:140px;font-family:monospace;font-size:12px" placeholder="John Smith, 0412345678, john@email.com, 15 Example St Greenvale&#10;Jane Doe, 0498765432, , 42 Maple Rd"></textarea></div><div id="imp-preview" style="font-size:12px;color:var(--muted);margin-top:4px"></div></div><div class="sht-ft"><button class="btn btn-gh" onclick="cls()">Cancel</button><button class="btn btn-gd" onclick="doImport()">Import</button></div></div>');}
function readImportFile(input){var file=input.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){var txt=e.target.result;var ta=document.getElementById('imp-txt');if(ta)ta.value=txt;var rows=parseCSV(txt);var pv=document.getElementById('imp-preview');if(pv)pv.textContent='Preview: '+rows.length+' contacts found';};reader.readAsText(file);}
function parseCSV(txt){var lines=txt.trim().split('\n');var rows=[];lines.forEach(function(line,idx){if(!line.trim())return;var fields=[];var cur='',inQ=false;for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'&&!inQ){inQ=true;}else if(ch==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}else if(ch==='"'&&inQ){inQ=false;}else if(ch===','&&!inQ){fields.push(cur.trim());cur='';}else cur+=ch;}fields.push(cur.trim());if(idx===0&&(fields[0]||'').toLowerCase().replace(/"/g,'').trim()==='name')return;if(fields.length>=1&&fields[0].trim()){rows.push({name:fields[0]||'',phone:fmtPh(fields[1]||''),email:fields[2]||'',address:fields[3]||'',suburb:fields[4]||'',notes:fields[5]||''});}});return rows;}
function doImport(){var txt=(document.getElementById('imp-txt')||{}).value||'';if(!txt.trim()){toast('No data to import');return;}var rows=parseCSV(txt);if(!rows.length){toast('No valid contacts found');return;}var contacts=gC();var added=0,skipped=0;rows.forEach(function(row){if(!row.name)return;var ph=row.phone;if(ph&&contacts.find(function(c){return fmtPh(c.phone)===ph;})){skipped++;return;}contacts.push({id:'c'+Date.now()+Math.random().toString(36).slice(2),name:row.name,phone:row.phone,email:row.email,address:row.address,notes:row.notes});added++;});sC();cls();toast('Imported '+added+' contacts'+(skipped?' ('+skipped+' skipped)':'')+'  ✓');rContacts();}

function logBulkSMS(){
  var sel=window._logSel||new Set();
  if(!sel.size){toast('Select contacts first');return;}
  // Build pool from selected interactions - get their phone numbers
  var pool=[];var seen=new Set();
  gI().forEach(function(ix){
    if(!sel.has(String(ix.id)))return;
    var ph=ix.phone||(ix.propertyId?((gP().find(function(p){return p.id===ix.propertyId;})||{}).p||''):'');
    var nm=ix.name||(ix.propertyId?((gP().find(function(p){return p.id===ix.propertyId;})||{}).n||''):'');
    var ad=ix.address||(ix.propertyId?((gP().find(function(p){return p.id===ix.propertyId;})||{}).a||''):'');
    if(ph&&!seen.has(ph)){seen.add(ph);pool.push({id:ix.propertyId||('l'+ix.id),a:ad,n:nm,p:ph,s:'',sb:''});}
  });
  if(!pool.length){toast('No phone numbers on selected contacts');return;}

}
function logSendSMS(id){

}

/* ── SWIPE ── */
function swipes(){
  document.querySelectorAll('.sw').forEach(function(wrap){
    var row=wrap.querySelector('.row');var acts=wrap.querySelector('.sw-acts');
    if(!row||!acts||row._sw)return;row._sw=true;
    acts.style.visibility='visible';
    var W=Math.max(acts.offsetWidth||0,66*acts.children.length)||210;
    var sx=0,sy=0,curX=0,moved=false,active=false,isOpen=false;
    row.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;curX=isOpen?-W:0;moved=false;active=true;},{passive:true});
    row.addEventListener('touchmove',function(e){if(!active)return;var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(!moved&&Math.abs(dy)>Math.abs(dx)+3){active=false;return;}moved=true;e.preventDefault();var target=(isOpen?-W:0)+dx;curX=Math.max(-W,Math.min(0,target));row.style.transition='none';row.style.transform='translateX('+curX+'px)';},{passive:false});
    row.addEventListener('touchend',function(){if(!active)return;active=false;row.style.transition='transform .22s ease';if(curX<-W/3){row.style.transform='translateX(-'+W+'px)';isOpen=true;row._open=true;}else{row.style.transform='translateX(0)';isOpen=false;row._open=false;}});
    row._close=function(){row.style.transition='transform .22s ease';row.style.transform='translateX(0)';isOpen=false;row._open=false;};
  });
  document.addEventListener('touchstart',function(e){document.querySelectorAll('.sw .row').forEach(function(r){if(r._open&&!r.contains(e.target)&&r._close)r._close();});},{passive:true});
}

/* ── SEARCH ── */
var _sT=null;
function srchBind(inputId,onResults,onSet){
  var inp=$(inputId);
  if(!inp)return;
  // iOS fix: ONLY use 'input' event - keydown/keyup/change cause keyboard dismiss
  // 'compositionend' handles Asian/predictive text input
  inp.addEventListener('input',function(){
    var v=this.value;
    if(onSet)onSet(v);
    clearTimeout(_sT);
    _sT=setTimeout(onResults,250);  // 250ms debounce - long enough for iOS
  });
  inp.addEventListener('compositionend',function(){
    var v=this.value;
    if(onSet)onSet(v);
    clearTimeout(_sT);
    _sT=setTimeout(onResults,100);
  });
  // Keep focus on iOS when results update
  inp.addEventListener('blur',function(){
    // If blur happens during a search debounce, refocus after short delay
    if(_sT){
      var self=this;
      setTimeout(function(){
        if(document.getElementById(inputId)===self)self.focus();
      },50);
    }
  });
}

async function pfProxyFetch(url){
  // Use Claude API as a CORS proxy to fetch from Pricefinder
  // This bypasses the CORS restriction in mobile browsers
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        system:'You are a proxy. Make an HTTP GET request to the URL provided using the web_fetch tool and return ONLY the raw JSON response body, nothing else.',
        messages:[{role:'user',content:'Fetch this URL with Authorization header "Bearer '+PF_TOKEN+'": '+url+'\n\nReturn ONLY the raw JSON response.'}],
        tools:[{type:'web_search_20250305',name:'web_search'}]
      })
    });
    if(!resp.ok)return null;
    var data=await resp.json();
    var text=data.content&&data.content.map(function(b){return b.type==='text'?b.text:'';}).join('');
    if(!text)return null;
    var start=text.indexOf('{');var end=text.lastIndexOf('}')+1;
    if(start>=0&&end>start){
      return JSON.parse(text.substring(start,end));
    }
  }catch(e){console.log('PF proxy err',e);}
  return null;
}

async function pfSearch(addr){
  if(!PF_TOKEN)return null;
  var ck='s:'+addr;if(_pfCache[ck])return _pfCache[ck];
  try{
    // Try direct fetch first (works if CORS is enabled)
    var r=await fetch(PF_BASE+'/suggest/properties?q='+encodeURIComponent(addr),{
      headers:{'Authorization':'Bearer '+PF_TOKEN,'Accept':'application/json'},
      mode:'cors'
    });
    if(r.ok){
      var d=await r.json();
      var match=d&&d.matches&&d.matches[0];
      if(match){_pfCache[ck]=match;return match;}
    }
  }catch(e){
    // CORS blocked - try proxy
    console.log('Direct fetch blocked, trying proxy...');
  }
  // Fallback: proxy through Claude API
  var d2=await pfProxyFetch(PF_BASE+'/suggest/properties?q='+encodeURIComponent(addr));
  if(d2&&d2.matches&&d2.matches[0]){_pfCache[ck]=d2.matches[0];return d2.matches[0];}
  return null;
}

// Load all PF data for a property and cache on the object
async function loadPFData(p){
  if(!PF_TOKEN)return;
  if(p._pfLoaded)return;
  var match=await pfSearch(p.a);
  if(!match||!match.property)return;
  var pfId=match.property.id;
  p._pfId=pfId;
  // Load in parallel
  var [det,est,sales,photos]=await Promise.all([
    pfGetProperty(pfId),
    pfGetEstimate(pfId),
    pfGetSales(pfId),
    pfGetPhotos(pfId)
  ]);
  if(det){
    if(det.features){
      p.beds=p.beds||det.features.bedrooms;
      p.baths=p.baths||det.features.bathrooms;
      p.cars=p.cars||det.features.carSpaces;
      p.landSqm=det.features.landArea;
      p.propType=det.features.propertyType;
    }
    if(det.address)p._pfAddr=det.address.display||p.a;
  }
  if(est&&est.estimates&&est.estimates.length){
    var e=est.estimates[0];
    p.estval=p.estval||('$'+Math.round((e.mid||e.high||0)/1000)+'K');
    p._pfEstLow=e.low;p._pfEstMid=e.mid;p._pfEstHigh=e.high;
  }
  if(sales&&sales.sales){
    p._pfSales=sales.sales.slice(0,5);
    if(sales.sales.length){
      var last=sales.sales[0];
      p._pfLastSale=last.price?'$'+last.price.toLocaleString():null;
      p._pfLastSaleDate=last.contractDate||last.settledDate||null;
    }
  }
  if(photos&&photos.photos&&photos.photos.length){
    p._pfPhotos=photos.photos.slice(0,5).map(function(ph){return ph.url||ph.href||ph;});
  }
  p._pfLoaded=true;
  sP(); // Save enriched data
  return p;
}
